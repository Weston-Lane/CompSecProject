<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Secure Doc Share</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header style="background-color: #333; color: white;">
        <h1>Dashboard ------ ADMIN -------</h1>
        <button onclick="logoutUser()">Logout</button>
    </header>

    <main>
        <section id="upload-section">
            <h2>Upload a Document</h2>
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Secure Upload</button>
        </section>

        <hr>

        <section id="my-library-section">
            <h2>My Documents</h2>
            <ul id="my-document-list"></ul>
        </section>
        <div id="share-form-container" style="display: none; border: 1px solid #000; padding: 10px; margin-top: 20px;">
        <h3>Share File</h3>
            <p>File ID: <span id="share-file-id-display"></span></p>
            <input type="hidden" id="share-file-id">
            <input type="text" id="share-target-user" placeholder="Enter Username to share with">
            <button onclick="submitShare()">Grant Access</button>
            <button onclick="closeShareForm()">Cancel</button>
        </div>
        <hr>
        <section id="shared-library-section">
            <h2>Shared With Me</h2>
            <ul id="shared-document-list"></ul>
        </section>

        <hr style="border: 2px solid red;">

        <section id="admin-all-documents-section">
            <h2 style="color: red;">[ADMIN] All System Documents</h2>
            <ul id="all-document-list"></ul>
        </section>

        <hr style="border: 2px solid red;">

        <section id="admin-users-section">
            <h2 style="color: red;">[ADMIN] User Management</h2>
            <ul id="user-list"></ul>
        </section>

    </main>

    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/admin_dashboard.js"></script>
</body>
</html>
